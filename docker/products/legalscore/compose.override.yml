# Product compose override for LegalScore
services:
  legalscore-api:
    build:
      context: ../..
      dockerfile: services/gateway/Dockerfile
    container_name: legalscore-api
    environment:
      # Conecta via PgBouncer (pool_mode=transaction) como app_user (NOSUPERUSER).
      # RLS ativa: app_user bypassa FORCE RLS diferente de postgres (superusuário).
      # PgBouncer conhece app_user via pgbouncer-init.sh (userlist.txt gerado em runtime).
      - DATABASE_URL=postgresql://app_user:${APP_USER_PASSWORD}@pgbouncer:6432/${POSTGRES_DB}
