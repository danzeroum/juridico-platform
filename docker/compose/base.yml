# =============================================================================
# BASE - Stack compartilhado: PostgreSQL, PgBouncer, Neo4j, OpenSearch,
#        Redis, MinIO, ChromaDB
# SEGURANÇA: nenhuma porta de banco exposta no host.
#            Apenas Traefik expõe 80/443.
#            Em VM pública (nó único): serviços bound a 127.0.0.1 internamente.
#            Acesso admin via túnel SSH: ssh -L 5432:postgres:5432 user@host
# =============================================================================

services:

  # ---------------------------------------------------------------------------
  # PostgreSQL 16 - Banco relacional principal
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./scripts/bootstrap-db.sql:/docker-entrypoint-initdb.d/01-init.sql
    # SEM ports: no host — acesso somente via rede interna ou túnel SSH
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - juridico-net
    deploy:
      resources:
        limits:
          memory: 4G
          cpus: "2"

  # ---------------------------------------------------------------------------
  # PgBouncer - Pool de conexões (OBRIGATÓRIO - nunca conectar direto ao PG)
  # pool_mode: transaction — ATENÇÃO: usar SET LOCAL (não SET) para tenant_id
  # ---------------------------------------------------------------------------
  pgbouncer:
    image: edoburu/pgbouncer:1.20
    container_name: pgbouncer
    restart: unless-stopped
    environment:
      PGBOUNCER_DATABASE: ${POSTGRES_DB}
      PGBOUNCER_USER: ${POSTGRES_USER}
      PGBOUNCER_PASSWORD: ${POSTGRES_PASSWORD}
      PGBOUNCER_SERVERS: postgres:5432
      PGBOUNCER_AUTH_TYPE: md5
      PGBOUNCER_POOL_MODE: transaction
      PGBOUNCER_MAX_CLIENT_CONN: 1000
      PGBOUNCER_DEFAULT_POOL_SIZE: 20
    # SEM ports: no host
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - juridico-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h localhost -p 6432"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---------------------------------------------------------------------------
  # Neo4j 5 Community - Grafo de relações societárias e processos
  # Community: gratuito, sem clustering nativo. Adequado para Fases 0-2.
  # Para Fase 3 (HA): avaliar Enterprise (ver Pendencia.md PD-01).
  # ---------------------------------------------------------------------------
  neo4j:
    image: neo4j:5-community
    container_name: neo4j
    restart: unless-stopped
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
      - ./docker/config/neo4j.conf:/etc/neo4j/neo4j.conf
    environment:
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD}
      NEO4J_server_mode: "SINGLE"
    # SEM ports: no host
    networks:
      - juridico-net
    healthcheck:
      test: ["CMD-SHELL", "cypher-shell -u neo4j -p ${NEO4J_PASSWORD} 'RETURN 1' 2>/dev/null"]
      interval: 15s
      timeout: 10s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 8G
          cpus: "4"

  # ---------------------------------------------------------------------------
  # OpenSearch 2.12 - Busca full-text (acórdãos, legislação)
  # ---------------------------------------------------------------------------
  opensearch:
    image: opensearchproject/opensearch:2.12.0
    container_name: opensearch
    restart: unless-stopped
    environment:
      - discovery.type=single-node
      - OPENSEARCH_JAVA_OPTS=-Xms2g -Xmx2g
      - DISABLE_SECURITY_PLUGIN=true
    volumes:
      - opensearch_data:/usr/share/opensearch/data
    # SEM ports: no host
    networks:
      - juridico-net
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health"]
      interval: 15s
      timeout: 10s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 4G
          cpus: "2"

  # ---------------------------------------------------------------------------
  # Redis 7 - Cache, sessões, Celery broker
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: redis
    restart: unless-stopped
    command: >
      redis-server
      --maxmemory 2gb
      --maxmemory-policy allkeys-lru
      --appendonly yes
      --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    # SEM ports: no host
    networks:
      - juridico-net
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: "1"

  # ---------------------------------------------------------------------------
  # MinIO - Data Lake S3-compatível (bronze/silver/gold)
  # Todos os buckets são PRIVADOS por padrão (sem acesso anônimo).
  # ---------------------------------------------------------------------------
  minio:
    image: minio/minio:latest
    container_name: minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_PASSWORD}
    volumes:
      - minio_data:/data
    # SEM ports: no host — console e API só via rede interna ou túnel SSH
    networks:
      - juridico-net
    healthcheck:
      test: ["CMD-SHELL", "mc ready local 2>/dev/null || curl -sf http://localhost:9000/minio/health/live"]
      interval: 15s
      timeout: 10s
      retries: 5

  # Inicialização dos buckets MinIO - todos privados, sem acesso anônimo
  minio-init:
    image: minio/mc:latest
    container_name: minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 ${MINIO_USER} ${MINIO_PASSWORD};
      mc mb local/bronze --ignore-existing;
      mc mb local/silver --ignore-existing;
      mc mb local/gold --ignore-existing;
      mc mb local/documents --ignore-existing;
      mc mb local/backups --ignore-existing;
      mc anonymous set none local/bronze;
      mc anonymous set none local/silver;
      mc anonymous set none local/gold;
      mc anonymous set none local/documents;
      mc anonymous set none local/backups;
      mc version enable local/bronze;
      mc version enable local/silver;
      mc version enable local/gold;
      echo 'MinIO: buckets configurados e acesso anônimo desabilitado em todos.';
      exit 0;
      "
    networks:
      - juridico-net

  # ---------------------------------------------------------------------------
  # ChromaDB - Banco vetorial para RAG
  # ---------------------------------------------------------------------------
  chromadb:
    image: chromadb/chroma:latest
    container_name: chromadb
    restart: unless-stopped
    volumes:
      - chromadb_data:/chroma/chroma
    # SEM ports: no host
    networks:
      - juridico-net
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8000/api/v1/heartbeat"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: "1"

networks:
  juridico-net:
    driver: bridge

volumes:
  pg_data:
  neo4j_data:
  neo4j_logs:
  opensearch_data:
  redis_data:
  minio_data:
  chromadb_data:
