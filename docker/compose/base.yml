# =============================================================================
# BASE - Stack compartilhado: PostgreSQL, PgBouncer, Neo4j, OpenSearch,
#        Redis, MinIO, ChromaDB
# Todos os produtos dependem deste arquivo
# =============================================================================

services:

  # ---------------------------------------------------------------------------
  # PostgreSQL 16 - Banco relacional principal
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./scripts/bootstrap-db.sql:/docker-entrypoint-initdb.d/01-init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - juridico-net
    deploy:
      resources:
        limits:
          memory: 4G
          cpus: "2"

  # ---------------------------------------------------------------------------
  # PgBouncer - Pool de conexões (OBRIGATÓRIO - nunca conectar direto ao PG)
  # ---------------------------------------------------------------------------
  pgbouncer:
    image: edoburu/pgbouncer:1.20
    container_name: pgbouncer
    restart: unless-stopped
    environment:
      PGBOUNCER_DATABASE: ${POSTGRES_DB}
      PGBOUNCER_USER: ${POSTGRES_USER}
      PGBOUNCER_PASSWORD: ${POSTGRES_PASSWORD}
      PGBOUNCER_SERVERS: postgres:5432
      PGBOUNCER_AUTH_TYPE: md5
      PGBOUNCER_POOL_MODE: transaction
      PGBOUNCER_MAX_CLIENT_CONN: 1000
      PGBOUNCER_DEFAULT_POOL_SIZE: 20
    ports:
      - "6432:6432"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - juridico-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h localhost -p 6432"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---------------------------------------------------------------------------
  # Neo4j 5 Enterprise - Grafo de relações societárias e processos
  # Licença developer gratuita até 1GB de grafo
  # ---------------------------------------------------------------------------
  neo4j:
    image: neo4j:5-enterprise
    container_name: neo4j
    restart: unless-stopped
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
      - ./docker/config/neo4j.conf:/etc/neo4j/neo4j.conf
    environment:
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD}
      NEO4J_server_mode: "SINGLE"
      NEO4J_ACCEPT_LICENSE_AGREEMENT: "yes"
    ports:
      - "7474:7474"
      - "7687:7687"
    networks:
      - juridico-net
    healthcheck:
      test: ["CMD-SHELL", "cypher-shell -u neo4j -p ${NEO4J_PASSWORD} 'RETURN 1' 2>/dev/null"]
      interval: 15s
      timeout: 10s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 8G
          cpus: "4"

  # ---------------------------------------------------------------------------
  # OpenSearch 2.12 - Busca full-text (acórdãos, legislação)
  # ---------------------------------------------------------------------------
  opensearch:
    image: opensearchproject/opensearch:2.12.0
    container_name: opensearch
    restart: unless-stopped
    environment:
      - discovery.type=single-node
      - OPENSEARCH_JAVA_OPTS=-Xms2g -Xmx2g
      - DISABLE_SECURITY_PLUGIN=true
    volumes:
      - opensearch_data:/usr/share/opensearch/data
    ports:
      - "9200:9200"
    networks:
      - juridico-net
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health"]
      interval: 15s
      timeout: 10s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 4G
          cpus: "2"

  # ---------------------------------------------------------------------------
  # Redis 7 + Sentinel - Cache, sessões, Celery broker
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: redis
    restart: unless-stopped
    command: >
      redis-server
      --maxmemory 2gb
      --maxmemory-policy allkeys-lru
      --appendonly yes
      --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    networks:
      - juridico-net
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: "1"

  # ---------------------------------------------------------------------------
  # MinIO - Data Lake S3-compatível (bronze/silver/gold)
  # ---------------------------------------------------------------------------
  minio:
    image: minio/minio:latest
    container_name: minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_PASSWORD}
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    networks:
      - juridico-net
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 15s
      timeout: 10s
      retries: 5

  # Inicialização dos buckets MinIO
  minio-init:
    image: minio/mc:latest
    container_name: minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 ${MINIO_USER} ${MINIO_PASSWORD};
      mc mb local/bronze --ignore-existing;
      mc mb local/silver --ignore-existing;
      mc mb local/gold --ignore-existing;
      mc mb local/documents --ignore-existing;
      mc mb local/backups --ignore-existing;
      mc version enable local/bronze;
      mc version enable local/silver;
      mc version enable local/gold;
      echo 'MinIO buckets configurados';
      exit 0;
      "
    networks:
      - juridico-net

  # ---------------------------------------------------------------------------
  # ChromaDB - Banco vetorial para RAG
  # ---------------------------------------------------------------------------
  chromadb:
    image: chromadb/chroma:latest
    container_name: chromadb
    restart: unless-stopped
    volumes:
      - chromadb_data:/chroma/chroma
    ports:
      - "8001:8000"
    networks:
      - juridico-net
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8000/api/v1/heartbeat"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: "1"
