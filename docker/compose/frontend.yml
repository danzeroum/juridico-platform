# =============================================================================
# FRONTEND — Next.js 14 platform app
# Rota pública via Traefik: https://${DOMAIN}
# Comunicação interna com gateway: http://gateway:8000
# =============================================================================

services:

  platform:
    build:
      context: ./frontend
      dockerfile: apps/platform/Dockerfile
    container_name: platform
    restart: unless-stopped
    environment:
      NODE_ENV: production
      # Lido em runtime pelo API route /api/auth/login (server-side only)
      NEXT_PUBLIC_GATEWAY_URL: http://gateway:8000
    networks:
      - juridico-net
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/ > /dev/null || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 3
      start_period: 40s
    labels:
      - "traefik.enable=true"
      # Rota HTTPS principal
      - "traefik.http.routers.platform.rule=Host(`${DOMAIN}`)"
      - "traefik.http.routers.platform.entrypoints=websecure"
      - "traefik.http.routers.platform.tls.certresolver=letsencrypt"
      - "traefik.http.services.platform.loadbalancer.server.port=3000"
      # Rota HTTP → redireciona para HTTPS (já tratado pelo traefik global,
      # mas router explícito garante o bind correto no entrypoint web)
      - "traefik.http.routers.platform-http.rule=Host(`${DOMAIN}`)"
      - "traefik.http.routers.platform-http.entrypoints=web"
      - "traefik.http.routers.platform-http.middlewares=redirect-to-https"
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1"

networks:
  juridico-net:
    driver: bridge
