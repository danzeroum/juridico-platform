name: CI

on:
  push:
    branches:
      - main
      - "claude/**"
      - "feature/**"
  pull_request:
    branches:
      - main

jobs:
  # ---------------------------------------------------------------------------
  # Testes unitários + contratos SEAMS
  # ---------------------------------------------------------------------------
  unit-tests:
    name: Unit & Contract Tests (Python 3.12)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install \
            pydantic==2.9.2 \
            scikit-learn==1.5.2 \
            numpy==1.26.4 \
            jsonschema==4.23.0 \
            httpx==0.27.2 \
            requests==2.32.3 \
            fastapi==0.115.0 \
            "python-multipart>=0.0.9" \
            pytest==8.3.3 \
            pytest-cov==5.0.0 \
            pytest-asyncio==0.24.0 \
            "PyJWT[crypto]==2.9.0" \
            cryptography==43.0.3 \
            "sqlalchemy>=2.0,<3" || true

      - name: Run unit tests with coverage
        run: |
          pytest \
            tests/unit/ \
            tests/e2e/ \
            services/scoring/tests/contract/ \
            services/shared/alerts/tests/ \
            --cov=services \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            --cov-fail-under=80 \
            -v
        env:
          HMAC_KEY: "aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa"
          ENV: test

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage.xml

  # ---------------------------------------------------------------------------
  # Lint
  # ---------------------------------------------------------------------------
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install ruff
        run: pip install ruff==0.6.9

      - name: Run ruff
        run: ruff check services/ tests/ --ignore E501,B008,UP007

  # ---------------------------------------------------------------------------
  # Validação de schemas SEAMS
  # ---------------------------------------------------------------------------
  schema-validation:
    name: Validate SEAMS Schemas
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install jsonschema
        run: pip install jsonschema==4.23.0

      - name: Validate alert.v1.json schema
        run: python scripts/validate_schema.py

  # ---------------------------------------------------------------------------
  # Verificação de segurança: sem portas de banco e sem api.insecure
  # ---------------------------------------------------------------------------
  docker-security:
    name: Docker Security Check
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - name: Install pyyaml
        run: pip install pyyaml==6.0.2

      - name: Check no DB ports exposed in base.yml
        run: python scripts/check_docker_security.py

      - name: Check no --api.insecure in traefik.yml
        run: |
          if grep -q "api.insecure=true" docker/compose/traefik.yml; then
            echo "FALHA: --api.insecure=true encontrado no traefik.yml" >&2
            exit 1
          fi
          echo "OK: traefik sem --api.insecure=true"

  # ---------------------------------------------------------------------------
  # Verificação de anti-patterns de código
  # ---------------------------------------------------------------------------
  api-antipatterns:
    name: API Anti-patterns Check
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - name: Check no raw SHA-256 truncation in lgpd.py
        run: |
          if grep -n 'hexdigest()\[' services/shared/lgpd.py; then
            echo "FALHA: SHA-256 truncado encontrado em lgpd.py" >&2
            exit 1
          fi
          echo "OK: lgpd.py sem truncamento SHA-256"

      - name: Check no entries window limit in merkle.py
        run: |
          if grep -n 'entries\[-' services/shared/ledger/merkle.py; then
            echo "FALHA: Merkle tree com janela limitada de entradas" >&2
            exit 1
          fi
          echo "OK: merkle.py sem janela limitada"

  # ---------------------------------------------------------------------------
  # Testes de integração — RLS + isolamento de tenant contra Postgres real
  #
  # Prova que app_user (NOSUPERUSER) está sujeito a FORCE ROW LEVEL SECURITY e
  # que SET LOCAL (set_config is_local=true) não vaza entre transações no pool.
  # Sem Postgres real no CI, esses testes eram pulados silenciosamente.
  #
  # Nota: testa via Postgres direto (porta 5432), não via PgBouncer — a propriedade
  # de SET LOCAL é do protocolo Postgres, independente do proxy. O comportamento
  # do PgBouncer (reuso de conexão em transaction mode) é validado no compose local.
  # ---------------------------------------------------------------------------
  integration-tests:
    name: Integration Tests — RLS + tenant isolation (Python 3.12 + Postgres 16)
    runs-on: ubuntu-latest
    timeout-minutes: 10

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: juridico
          POSTGRES_PASSWORD: testpassword
          POSTGRES_DB: juridico_platform
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4

      - name: Install PostgreSQL client
        run: sudo apt-get install -y postgresql-client

      - name: Bootstrap database (schema + RLS + app_user + probe table)
        run: |
          PGPASSWORD=testpassword psql -h localhost -U juridico -d juridico_platform \
            -f scripts/bootstrap-db.sql
          PGPASSWORD=testpassword psql -h localhost -U juridico -d juridico_platform \
            -c "ALTER ROLE app_user PASSWORD 'testpassword';"

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install \
            pydantic==2.9.2 \
            pytest==8.3.3 \
            pytest-asyncio==0.24.0 \
            "sqlalchemy>=2.0,<3"

      - name: Run integration tests as app_user
        run: pytest tests/integration/ -m integration -v
        env:
          DATABASE_URL: postgresql://app_user:testpassword@localhost:5432/juridico_platform
          HMAC_KEY: "aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa"
          ENV: test
