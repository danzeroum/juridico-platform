name: CI

on:
  push:
    branches:
      - main
      - "claude/**"
      - "feature/**"
  pull_request:
    branches:
      - main

jobs:
  # ---------------------------------------------------------------------------
  # Testes unitários + contratos SEAMS
  # ---------------------------------------------------------------------------
  unit-tests:
    name: Unit & Contract Tests (Python 3.12)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # Core deps para testes
          pip install \
            pydantic==2.9.2 \
            scikit-learn==1.5.2 \
            numpy==1.26.4 \
            jsonschema==4.23.0 \
            httpx==0.27.2 \
            fastapi==0.115.0 \
            pytest==8.3.3 \
            pytest-cov==5.0.0 \
            pytest-asyncio==0.24.0
          # JWT e crypto (para gateway auth tests)
          pip install "PyJWT[crypto]==2.9.0" cryptography==43.0.3 || true

      - name: Run unit tests with coverage
        run: |
          pytest \
            tests/unit/ \
            services/scoring/tests/contract/ \
            services/shared/alerts/tests/ \
            --cov=services \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            --cov-fail-under=80 \
            -v
        env:
          HMAC_KEY: "aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa"
          ENV: test

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage.xml

  # ---------------------------------------------------------------------------
  # Lint e type checking
  # ---------------------------------------------------------------------------
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install ruff
        run: pip install ruff==0.6.9

      - name: Run ruff
        run: ruff check services/ tests/ --ignore E501,B008,UP007

  # ---------------------------------------------------------------------------
  # Validação de schemas SEAMS
  # ---------------------------------------------------------------------------
  schema-validation:
    name: Validate SEAMS Schemas
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install jsonschema
        run: pip install jsonschema==4.23.0

      - name: Validate alert.v1.json schema
        run: python -c "
          import json, jsonschema
          schema = json.load(open('schemas/alert.v1.json'))
          # Meta-validação: o schema em si é válido JSON Schema
          jsonschema.Draft202012Validator.check_schema(schema)
          print('schemas/alert.v1.json: OK')
        "

  # ---------------------------------------------------------------------------
  # Verificação de segurança: sem portas de banco no compose
  # ---------------------------------------------------------------------------
  docker-security:
    name: Docker Security Check
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - name: Check no DB ports exposed in base.yml
        run: |
          python3 - << 'EOF'
          import yaml, sys

          with open("docker/compose/base.yml") as f:
              compose = yaml.safe_load(f)

          DB_SERVICES = {"postgres", "pgbouncer", "neo4j", "opensearch", "redis", "chromadb"}
          failures = []

          for svc_name, svc in compose.get("services", {}).items():
              if svc_name in DB_SERVICES:
                  ports = svc.get("ports", [])
                  if ports:
                      failures.append(f"FALHA: {svc_name} tem ports expostas: {ports}")

          if failures:
              for f in failures:
                  print(f, file=sys.stderr)
              sys.exit(1)
          else:
              print("OK: nenhuma porta de banco exposta no host.")
          EOF

      - name: Check no --api.insecure in traefik.yml
        run: |
          if grep -q "api.insecure=true" docker/compose/traefik.yml; then
            echo "FALHA: --api.insecure=true encontrado no traefik.yml" >&2
            exit 1
          fi
          echo "OK: traefik sem --api.insecure=true"

      - name: Install PyYAML
        run: pip install pyyaml==6.0.2

      - name: Re-run with PyYAML
        run: |
          python3 - << 'EOF'
          import yaml, sys

          with open("docker/compose/base.yml") as f:
              compose = yaml.safe_load(f)

          DB_SERVICES = {"postgres", "pgbouncer", "neo4j", "opensearch", "redis", "chromadb"}
          failures = []

          for svc_name, svc in compose.get("services", {}).items():
              if svc_name in DB_SERVICES:
                  ports = svc.get("ports", [])
                  if ports:
                      failures.append(f"FALHA: {svc_name} tem ports expostas: {ports}")

          if failures:
              for f in failures:
                  print(f, file=sys.stderr)
              sys.exit(1)
          else:
              print("OK: nenhuma porta de banco exposta no host.")
          EOF

  # ---------------------------------------------------------------------------
  # Verificação de anti-patterns de API
  # ---------------------------------------------------------------------------
  api-antipatterns:
    name: API Anti-patterns Check
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - name: Check no raw SHA-256 truncation in lgpd.py
        run: |
          if grep -n "hexdigest()\[:.*\]" services/shared/lgpd.py; then
            echo "FALHA: SHA-256 truncado encontrado em lgpd.py" >&2
            exit 1
          fi
          echo "OK: lgpd.py sem truncamento SHA-256"

      - name: Check no entries[-N:] in merkle.py
        run: |
          if grep -n "entries\[-" services/shared/ledger/merkle.py; then
            echo "FALHA: Merkle tree com janela limitada de entradas" >&2
            exit 1
          fi
          echo "OK: merkle.py sem janela limitada"
